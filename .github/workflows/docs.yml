                 
  name: Docs — build and deploy
                                                                                                                                                                   
  # Publishes docs/ (via mkdocs-material) to GitHub Pages on push to main.
  # Site source is docs/index.md + docs/process.md. Other repo files (reviews,                                                                                     
  # identity, safety docs) are linked from those but not built into the site —                                                                                     
  # they render directly on github.com as markdown.
                                                                                                                                                                   
  on:             
    push:
      branches:
        - main
      paths:
        - docs/**                                                                                                                                                  
        - mkdocs.yml
        - .github/workflows/docs.yml                                                                                                                               
    workflow_dispatch:

  permissions:
    contents: read
    pages: write
    id-token: write
                                                                                                                                                                   
  concurrency:
    group: docs-deploy                                                                                                                                             
    cancel-in-progress: false

  jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
                                                                                                                                                                   
        - name: Set up Python
          uses: actions/setup-python@v5                                                                                                                            
          with:   
            python-version: '3.12'

        - name: Install dependencies                                                                                                                               
          run: |
            python -m pip install --upgrade pip                                                                                                                    
            pip install \
              mkdocs-material \
              pymdown-extensions

        - name: Build site
          # Not --strict: process.md and index.md link out to other repo files
          # (../consciousness_reviews/, ../identity/, ../safety/) which render                                                                                     
          # fine on github.com but aren't part of the mkdocs site build. Those
          # broken-link warnings are expected and non-fatal.                                                                                                       
          run: mkdocs build
                                                                                                                                                                   
        - name: Upload artifact
          uses: actions/upload-pages-artifact@v3
          with:                                                                                                                                                    
            path: site
                                                                                                                                                                   
    deploy:       
      needs: build
      runs-on: ubuntu-latest
      environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}
      steps:                                                                                                                                                       
        - name: Deploy to GitHub Pages
          id: deployment                                                                                                                                           
          uses: actions/deploy-pages@v4

